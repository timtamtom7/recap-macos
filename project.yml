name: RECAP
options:
  bundleIdPrefix: com.recap
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.14.0"

targets:
  RECAP:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recap.app
        PRODUCT_NAME: RECAP
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Sources/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        SCREEN_CAPTURE_USAGE_DESCRIPTION: "RECAP needs screen recording access to capture your screen."
        MICROPHONE_USAGE_DESCRIPTION: "RECAP needs microphone access to record audio with your screen recording."
    dependencies:
      - package: SQLite

    entitlements:
      path: Sources/Resources/RECAP.entitlements
      properties:
        com.apple.security.app-sandbox: false

  RECAPTests:
    type: bundle
    platform: macOS
    sources:
      - Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recap.app.tests
        PRODUCT_NAME: RECAPTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        BUNDLE_LOADABLE: YES
        WRAPPER_EXTENSION: xctest
        GENERATE_INFOPLIST_FILE: YES
        GENERATE_INFOPLIST_FILE_FOR_TESTING: YES
        LD_RUNPATH_SEARCH_PATHS: "@test_runner_path/../Frameworks"
    dependencies:
      - target: RECAP
      - sdk: XCTest.framework
