name: Recap
options:
  bundleIdPrefix: com.recap
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Recap
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Recap:
    type: application
    platform: macOS
    sources:
      - path: RECAP
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: RECAP/Info.plist
        CODE_SIGN_ENTITLEMENTS: RECAP/Recap.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.recap.app
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: RECAP/Recap.entitlements
